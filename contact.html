<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Kartheek Puchakayala</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="site-header">
  <div class="container nav-container">
    <div class="logo">KP</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="section fade-in">
    <div class="container">
      <h1>Contact</h1>
      <p class="subtitle">
        Interested in working together or just want to talk architecture, microservices, or cloud?
        Drop a message.
      </p>

      <div class="grid-2">
        <div>
          <h3>Details</h3>
          <p><strong>Email:</strong> <a href="mailto:Kartheek.puchakayala@gmail.com">Kartheek.puchakayala@gmail.com</a></p>
          <p><strong>Location:</strong> Elkhorn, NE, USA</p>
        </div>

        <form class="card contact-form" onsubmit="handleContactSubmit(event)">
          <label>
            Name
            <input type="text" name="name" required />
          </label>
          <label>
            Email
            <input type="email" name="email" required />
          </label>
          <label>
            Message
            <textarea name="message" rows="5" required></textarea>
          </label>
          <button type="submit" class="btn primary">Send Message</button>
          <p id="form-status" class="form-status"></p>
        </form>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-content">
    <p>© 2026 Kartheek Puchakayala</p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
